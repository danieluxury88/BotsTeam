<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="DevBots Dashboard - Activity Feed">
    <meta name="theme-color" content="#3498db">
    <title>Activity - DevBots Dashboard</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">

    <!-- CSS -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- Header -->
    <header class="header" role="banner">
        <div class="header-content">
            <div class="header-brand">
                <span class="header-logo">🤖</span>
                <h1 class="header-title">DevBots Dashboard</h1>
            </div>
            <nav class="header-nav" role="navigation" aria-label="Main navigation" data-page="activity"></nav>
            <div class="header-actions">
                <button class="btn-icon" id="refresh-btn" aria-label="Refresh data" title="Refresh">
                    <span class="icon">🔄</span>
                </button>
                <button class="btn-icon" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">
                    <span class="icon">☀️</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main" role="main">
        <div class="container">
            <section class="page-section" aria-label="Activity Feed">
                <div class="section-header">
                    <h2 class="section-title">Activity Feed</h2>
                </div>
                <div class="reports-list" id="activity-list">
                    <div class="loading">Loading activity...</div>
                </div>
            </section>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer" role="contentinfo">
        <div class="footer-content">
            <p>&copy; 2026 DevBots. Built with ❤️ and no frameworks.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/components.js"></script>
    <script src="js/sw-register.js"></script>
    <script src="js/activity.js"></script>

    <noscript>
        <div class="no-js-message">
            <p>This dashboard works best with JavaScript enabled.</p>
        </div>
    </noscript>
</body>
</html>
