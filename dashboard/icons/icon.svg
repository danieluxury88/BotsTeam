  <circle cx="326" cy="234" r="12" fill="#ffffff" opacity="0.8"/>
  
  <!-- Robot mouth -->
  <rect x="186" y="298" width="140" height="8" rx="4" fill="#3498db"/>
  
  <!-- Antenna -->
